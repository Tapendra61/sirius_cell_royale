; Cell Royale gameplay tuning. Hot-reloaded in dev builds.
; Values are educated guesses; expect to multiply most by 0.5-2x before they feel right.

[cell]
base_speed = 280.0           ; pixels/sec at radius 30
speed_falloff = 0.45         ; speed = base / (radius^falloff)
start_mass = 100.0
max_cells_per_player = 16

[absorb]
overlap_required = 0.4       ; fraction of small radius that must overlap
mass_ratio_required = 1.25   ; big must be 1.25x small
combo_window_sec = 2.5

[split]
min_mass_to_split = 200.0
launch_velocity = 700.0
launch_decay = 4.0           ; per second
recombine_delay_sec = 12.0

[eject]
min_mass_to_eject = 150.0
eject_mass = 18.0
eject_velocity = 600.0

[dash]
duration_sec = 0.4
invuln_frames_sec = 0.15
speed_multiplier = 3.0
cost_percent = 0.08
cooldown_sec = 4.0

[crit]
chance_per_absorb = 0.05      ; 1 in 20
bonus_multiplier = 1.5
near_miss_threshold = 0.92    ; if you escaped with > this fraction overlap, it's a "near miss"

[world]
width = 16000
height = 16000
food_target = 3600
virus_count = 60

[bots]
target_count = 50
spawn_interval_sec = 1.5
difficulty_scaling = 0.85     ; bots tuned to be slightly easier than equivalent player

[feel]
screen_shake_max = 16.0
hitstop_threshold_mass = 250
hitstop_duration_sec = 0.06
particle_pool_size_desktop = 8192
particle_pool_size_mobile = 2048
