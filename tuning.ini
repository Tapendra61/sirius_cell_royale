; Cell Royale gameplay tuning. Hot-reloaded in dev builds.
; Values are educated guesses; expect to multiply most by 0.5-2x before they feel right.

[cell]
base_speed = 280.0           ; pixels/sec at radius 30
speed_falloff = 0.45         ; speed = base / (radius^falloff)
start_mass = 100.0
max_cells_per_player = 16

[absorb]
overlap_required = 0.4       ; fraction of small radius that must overlap
mass_ratio_required = 1.25   ; big must be 1.25x small
combo_window_sec = 2.5

[split]
min_mass_to_split = 200.0
launch_velocity = 700.0
launch_decay = 4.0           ; per second
recombine_delay_sec = 12.0

[eject]
min_mass_to_eject = 150.0
eject_mass = 18.0
eject_velocity = 600.0

[blast]
min_mass = 300               ; cell must be at least this big to cast
cost_percent = 0.20          ; fraction of source cell's mass spent on the cast
radius = 600                 ; push range (world units)
push_speed = 1200            ; peak outward velocity applied to enemy cells at centre
food_push_scale = 0.5        ; food gets this fraction of cell push (gentler scatter)
cooldown_sec = 6.0           ; seconds between casts (longer than dash so bots can't spam)

[dash]
duration_sec = 0.4
invuln_frames_sec = 0.15
speed_multiplier = 3.0
cost_percent = 0.08
cooldown_sec = 4.0

[crit]
chance_per_absorb = 0.05      ; 1 in 20
bonus_multiplier = 1.5
near_miss_threshold = 0.92    ; if you escaped with > this fraction overlap, it's a "near miss"

[world]
width = 16000
height = 16000
food_target = 3600
virus_count = 60

[pickups]
target = 12                  ; steady-state count of power-up drops in the world
shield_duration_sec = 4.0    ; you can't be absorbed while this is up
magnet_duration_sec = 5.0    ; nearby food drifts toward you
stealth_duration_sec = 4.0   ; bot AI ignores you as a target
magnet_radius = 800          ; world units that the magnet pull reaches
magnet_speed = 500           ; world units/sec velocity applied to food in range

[blackholes]
count = 5                    ; how many to scatter on the map
radius = 70                  ; visual size + inner threshold to "enter"
pull_radius = 220            ; outer reach of the pull
pull_speed = 600             ; peak pull acceleration near the inner edge
pull_min_speed = 150         ; gentle suck right at the outer ring (>0 so you can't camp the edge)
min_separation = 4000        ; minimum centre-to-centre distance between any two
stamina_drain_sec = 9.0      ; 1.0 -> 0 while hiding inside
stamina_refill_sec = 15.0    ; 0 -> 1 while outside
transition_sec = 0.35        ; smooth entry / exit animation length (shrink + pos lerp)

[bots]
target_count = 50             ; VS AI default. Royale (LocalHost/LocalClient) forces 0 at match start; use `bots N` to bring AI back per-match.
spawn_interval_sec = 1.5
difficulty_scaling = 0.85     ; bots tuned to be slightly easier than equivalent player

[match]
duration_sec = 0              ; 0 = unlimited (SP / sandbox). Royale modes override this to 300 (5 min) at match start so peers get a real "winner is..." moment.

[feel]
screen_shake_max = 16.0
hitstop_threshold_mass = 250
hitstop_duration_sec = 0.06
particle_pool_size_desktop = 8192
particle_pool_size_mobile = 2048

[comet]
event_interval_sec = 75       ; mean time between comet world events
interval_jitter = 0.30        ; +/- this fraction of the interval (RNG, deterministic)
telegraph_sec = 3.0           ; warning window before the strike (path line is shown)
radius = 1260                 ; kill radius (also drives visual size)
speed = 900                   ; world units / sec
first_after_sec = 45          ; delay before the first comet of a match

[comet_shower]
event_interval_sec = 180      ; mean time between comet-shower events (separate from singles)
first_after_sec = 90          ; delay before the first shower of a match
main_radius = 367             ; main comet's kill radius (smaller than the single-comet)
satellite_min = 3             ; minimum satellite count (4 comets total counting the main)
satellite_max = 6             ; maximum satellite count (7 comets total counting the main)
satellite_min_radius = 117    ; smallest satellite radius
satellite_max_radius = 233    ; largest satellite radius
spread_perp = 1800            ; perpendicular scatter of satellites around the main path
spread_along = 1500           ; longitudinal scatter (earlier / later landing than main)
min_separation = 600          ; min centre-to-centre distance between any two comets in the shower
